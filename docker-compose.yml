services:
  dockmeister:
    build: .
    container_name: dockmeister
    stdin_open: true
    tty: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./src:/app/src
      - ./stacks:/app/stacks
      - ./data:/app/data
    environment:
      - TERM=xterm-256color
      - PYTHONPATH=/app/src
    command: python -m dockmeister
